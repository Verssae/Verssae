name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@main
        with:
          card: stats
          token: ${{ secrets.GITHUB_TOKEN }}
          options: "username=Verssae&show_icons=true&theme=calm&hide_border=true"
          path: profile/stats.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          git diff --cached --quiet || git commit -m "chore: update github stats"
          git push
